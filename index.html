<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background-image: url('background.jpg');
            background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat;
            background-color: #333;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: -1;
        }

        .input-row { display: flex; border-bottom: 2px solid black; align-items: stretch; width: 100%; }
        .input-row:last-child { border-bottom: none; }
        .label-cell { width: 33.33%; background-color: white; padding: 10px; font-weight: bold; border-right: 2px solid black; display: flex; align-items: center; font-size: 1.25rem; }
        
        /* Regular weight for inputs as requested */
        .input-cell { width: 66.67%; padding: 10px; outline: none; background-color: #FFFFFF; text-align: center; font-style: italic; font-size: 1.25rem; color: black; border: none; font-weight: normal; }
        .input-cell:focus { background-color: #eff6ff; }
        
        select option { color: white !important; font-weight: bold !important; }
        option[value=""] { background-color: white !important; color: gray !important; }

        /* Table Styles - Fixed 10 Rows & Compact */
        .thin-table { border: 2px solid #000 !important; border-collapse: collapse; font-size: 1.05rem; table-layout: fixed; }
        .thin-table th { border: 2px solid #000 !important; @apply p-2 bg-gray-100 font-bold uppercase; height: 40px; }
        .thin-table td { border: 1px solid #000 !important; @apply p-1; font-weight: normal; height: 42px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .table-container { background: white; border: 1px solid #000; }
        
        .tab-btn { @apply px-3 py-1 border-2 border-black font-bold mr-2 mb-2 transition-all text-xs shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]; }
        .tab-active { @apply bg-black text-white; }
        .tab-inactive { @apply bg-white text-black hover:bg-gray-100; }

        /* Square Pagination Buttons */
        .page-ctrl-btn { @apply w-16 h-10 bg-black text-white font-bold disabled:opacity-30 flex items-center justify-center border-2 border-black transition-all hover:bg-gray-800 uppercase text-xs; }
        .page-num { @apply w-10 h-10 border-2 border-black font-bold mx-0.5 flex items-center justify-center transition-all text-sm; }
        .page-num-active { @apply bg-black text-white; }
        .page-num-inactive { @apply bg-white text-black hover:bg-gray-200; }
    </style>
</head>
<body class="p-4 font-sans relative">

    <div class="bg-overlay"></div>

    <div id="customAlert" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white border-4 border-black p-8 max-w-sm w-full shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center">
            <h2 class="text-2xl font-black mb-4 uppercase text-red-600">Missing Info</h2>
            <p class="text-lg font-bold mb-6">Please complete all required fields.</p>
            <button onclick="closeAlert()" class="bg-black text-white font-bold py-2 px-8 hover:bg-gray-800 transition-all uppercase">Got it</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-white/95 shadow-2xl border-2 border-black overflow-hidden mb-4">
        <div class="bg-yellow-400 p-2 text-center border-b-2 border-black">
            <h1 class="text-2xl font-black italic tracking-tight text-black uppercase">Please enter your details completely</h1>
        </div>

        <form id="entryForm" class="p-4 pb-2" novalidate autocomplete="off">
            <input type="hidden" id="editRowId" value="-1">
            <div class="border-2 border-black mb-2 bg-white">
                <div class="input-row"><div class="label-cell">Full Name:</div><input type="text" id="fullName" class="input-cell" placeholder="Enter full name"></div>
                <div class="input-row"><div class="label-cell">Position:</div>
                    <select id="position" class="input-cell">
                        <option value="">Click to select</option>
                        <option value="Student">Student</option>
                        <option value="Teaching Personnel">Teaching Personnel</option>
                        <option value="Non-Teaching Personnel">Non-Teaching Personnel</option>
                    </select>
                </div>
                <div class="input-row"><div id="idLabel" class="label-cell">Student ID Number:</div><input type="text" id="idInput" class="input-cell" placeholder="PIL-XX-XXXX"></div>
                <div class="input-row"><div class="label-cell">Department:</div>
                    <select id="dept" class="input-cell">
                        <option value="">Click to select</option>
                        <option value="CANR">CANR</option>
                        <option value="CDE">CDE</option>
                        <option value="CAS">CAS</option>
                        <option value="CEM">CEM</option>
                        <option value="CEFS">CEFS</option>
                        <option value="CVM">CVM</option>
                        <option value="GS">GS</option>
                        <option value="Non-Teaching Personnel">Non-Teaching Personnel</option>
                    </select>
                </div>
                <div class="input-row"><div class="label-cell border-b-0">Purpose:</div>
                    <select id="purpose" class="input-cell border-b-0">
                        <option value="">Click to select</option>
                        <option value="IE & VLP Password Reset">IE & VLP Password Reset</option>
                        <option value="IE Password Reset">IE Password Reset</option>
                        <option value="VLP Password Reset">VLP Password Reset</option>
                        <option value="Update IE Account Details">Update IE Account Details</option>
                        <option value="Update VLP Account Details">Update VLP Account Details</option>
                        <option value="Update IE & VLP Account Details">Update IE & VLP Account Details</option>
                        <option value="Hotspot Password Reset">Hotspot Password Reset</option>
                        <option value="IE & Hotspot Password Reset">IE & Hotspot Password Reset</option>
                        <option value="VLP & Hotspot Password Reset">VLP & Hotspot Password Reset</option>
                        <option value="IE, VLP, Hotspot Reset">IE, VLP, Hotspot Reset</option>
                        <option value="Zoom Account">Zoom Account</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-3 mb-1">
                <button type="button" id="cancelEdit" class="hidden bg-gray-400 text-white font-bold py-1 px-4 rounded border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] uppercase text-xs">Cancel</button>
                <button type="submit" id="submitBtn" class="bg-[#00FF00] hover:bg-green-400 text-black font-bold py-2 px-12 rounded-lg border-2 border-black text-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 transition-all">SAVE</button>
            </div>
        </form>

        <hr class="border-t-2 border-black">

        <div class="px-4 py-2">
            <div class="flex flex-col mb-1">
                <h3 class="font-bold uppercase text-[10px] italic tracking-widest text-gray-500">Filter by Month:</h3>
                <div id="tabContainer" class="flex flex-wrap mt-1"></div>
            </div>

            <div class="table-container">
                <table id="dataTable" class="w-full thin-table text-center">
                    <thead>
                        <tr>
                            <th style="width: 12%;">Date</th>
                            <th style="width: 25%;">Complete Name</th>
                            <th style="width: 15%;">Status</th>
                            <th style="width: 15%;">ID Number</th>
                            <th style="width: 10%;">Dept</th>
                            <th style="width: 23%;">Purpose:</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            
            <div id="paginationControls" class="flex justify-center items-center gap-1 py-3"></div>
        </div>
    </div>

    <script>
        const entryForm = document.getElementById('entryForm');
        const submitBtn = document.getElementById('submitBtn');
        const editRowIdInput = document.getElementById('editRowId');
        const cancelEditBtn = document.getElementById('cancelEdit');
        const alertBox = document.getElementById('customAlert');
        const tableBody = document.getElementById('tableBody');
        const tabContainer = document.getElementById('tabContainer');
        const paginationControls = document.getElementById('paginationControls');

        let currentFilter = 'All';
        let allData = [];
        let currentPage = 1;
        const rowsPerPage = 10; // Fixed to 10 rows

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZfS9AV6BzTscvOrI6UNAHw7V2lxD23vgCI0n7_hDRaXD2Rd73ZA3cPsUQSdoqMTEU/exec';

        window.onload = () => loadCloudData(false);

        function closeAlert() { alertBox.classList.add('hidden'); }

        async function loadCloudData(silent = false) {
            if (!silent) tableBody.innerHTML = '<tr><td colspan="6" class="p-4 text-blue-600 font-bold animate-pulse">SYNCING...</td></tr>';
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                allData = await response.json();
                renderPortal();
            } catch (error) {
                if (!silent) tableBody.innerHTML = '<tr><td colspan="6" class="p-4 text-red-600">Connection Error.</td></tr>';
            }
        }

        document.getElementById('position').addEventListener('change', function() {
            const isEmp = (this.value === "Teaching Personnel" || this.value === "Non-Teaching Personnel");
            document.getElementById('idLabel').textContent = isEmp ? "Employee ID Number:" : "Student ID Number:";
            document.getElementById('idInput').placeholder = isEmp ? "E01-XX-XXXX" : "PIL-XX-XXXX";
        });

        entryForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('fullName').value.trim();
            const pos = document.getElementById('position').value;
            const idNum = document.getElementById('idInput').value.trim();
            const dept = document.getElementById('dept').value;
            const purp = document.getElementById('purpose').value;

            if (!name || !pos || !idNum || !dept || !purp) { alertBox.classList.remove('hidden'); return; }

            const rowId = editRowIdInput.value;
            const action = rowId === "-1" ? "addRow" : "edit";
            const now = new Date();
            const monthLabel = "Month of " + now.toLocaleString('default', { month: 'long', year: 'numeric' });
            const formattedDate = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
            
            const tempRecord = { rowId: action === "edit" ? rowId : "temp-" + Date.now(), date: formattedDate, monthLabel, name, pos, idNum, dept, purp };

            if (action === "addRow") { allData.push(tempRecord); currentPage = 1; } 
            else { const idx = allData.findIndex(d => d.rowId == rowId); if (idx !== -1) allData[idx] = tempRecord; }

            renderPortal();
            submitBtn.disabled = true;
            submitBtn.textContent = "SAVING...";
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action, rowId, date: formattedDate, monthLabel, name, pos, idNum, dept, purp }) });
                entryForm.reset(); resetEditState();
                setTimeout(() => loadCloudData(true), 1500); 
            } catch (error) { submitBtn.disabled = false; }
        });

        function renderPortal() {
            tabContainer.innerHTML = '';
            const months = [...new Set(allData.map(item => item.monthLabel))].filter(m => m && m.startsWith('Month of'));
            
            const allBtn = document.createElement('button');
            allBtn.textContent = 'ALL RECORDS';
            allBtn.className = `tab-btn ${currentFilter === 'All' ? 'tab-active' : 'tab-inactive'}`;
            allBtn.onclick = () => { currentFilter = 'All'; currentPage = 1; renderPortal(); };
            tabContainer.appendChild(allBtn);
            
            months.forEach(m => {
                const btn = document.createElement('button');
                btn.textContent = m.toUpperCase();
                btn.className = `tab-btn ${currentFilter === m ? 'tab-active' : 'tab-inactive'}`;
                btn.onclick = () => { currentFilter = m; currentPage = 1; renderPortal(); };
                tabContainer.appendChild(btn);
            });

            const filteredData = [...allData].reverse().filter(d => currentFilter === 'All' || d.monthLabel === currentFilter);
            const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            const startIndex = (currentPage - 1) * rowsPerPage;
            const pageData = filteredData.slice(startIndex, startIndex + rowsPerPage);

            tableBody.innerHTML = '';
            
            // Render Data Rows
            pageData.forEach(data => addTableRowUI(data));

            // Logic to keep 10 rows fixed even if empty
            const fillerRows = rowsPerPage - pageData.length;
            for (let i = 0; i < fillerRows; i++) {
                const tr = document.createElement('tr');
                tr.className = "bg-white border-b border-black";
                tr.innerHTML = `<td colspan="6">&nbsp;</td>`;
                tableBody.appendChild(tr);
            }

            renderPaginationControls(totalPages);
        }

        function addTableRowUI(data) {
            const row = document.createElement('tr');
            row.className = "bg-white border-b border-black cursor-pointer hover:bg-gray-50";
            row.onclick = () => editRow(data.rowId);
            const posColor = data.pos === 'Non-Teaching Personnel' ? '#7E22CE' : (data.pos === 'Teaching Personnel' ? '#15803D' : '#93C5FD');
            const textColor = (data.dept === 'CEM' || data.dept === 'CVM' || data.purp.includes('Update') || data.purp === 'IE Password Reset') ? 'black' : 'white';
            
            row.innerHTML = `
                <td>${data.date}</td>
                <td class="text-left pl-2">${data.name}</td>
                <td><span style="background-color: ${posColor}; color: ${data.pos === 'Student' ? 'black' : 'white'}" class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">${data.pos}</span></td>
                <td class="font-mono text-xs">${data.idNum}</td>
                <td><span style="background-color: ${getDeptColor(data.dept)}; color: ${textColor}" class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase">${data.dept}</span></td>
                <td><span style="background-color: ${getPurpColor(data.purp)}; color: ${textColor}" class="px-2 py-0.5 rounded-md text-[10px] font-bold uppercase">${data.purp}</span></td>
            `;
            tableBody.appendChild(row);
        }

        function renderPaginationControls(totalPages) {
            paginationControls.innerHTML = '';
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'PREV';
            prevBtn.disabled = currentPage === 1;
            prevBtn.className = 'page-ctrl-btn';
            prevBtn.onclick = () => { currentPage--; renderPortal(); };
            paginationControls.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pBtn = document.createElement('button');
                pBtn.textContent = i;
                pBtn.className = `page-num ${i === currentPage ? 'page-num-active' : 'page-num-inactive'}`;
                pBtn.onclick = () => { currentPage = i; renderPortal(); };
                paginationControls.appendChild(pBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'NEXT';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.className = 'page-ctrl-btn';
            nextBtn.onclick = () => { currentPage++; renderPortal(); };
            paginationControls.appendChild(nextBtn);
        }

        function editRow(rowId) {
            const record = allData.find(d => d.rowId == rowId);
            if (!record) return;
            document.getElementById('fullName').value = record.name;
            document.getElementById('position').value = record.pos;
            document.getElementById('idInput').value = record.idNum;
            document.getElementById('dept').value = record.dept;
            document.getElementById('purpose').value = record.purp;
            editRowIdInput.value = rowId;
            submitBtn.textContent = "UPDATE";
            submitBtn.classList.replace('bg-[#00FF00]', 'bg-blue-500');
            submitBtn.classList.add('text-white');
            cancelEditBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetEditState() {
            editRowIdInput.value = "-1";
            submitBtn.disabled = false;
            submitBtn.textContent = "SAVE";
            submitBtn.classList.replace('bg-blue-500', 'bg-[#00FF00]');
            submitBtn.classList.remove('text-white');
            cancelEditBtn.classList.add('hidden');
        }

        cancelEditBtn.onclick = () => { entryForm.reset(); resetEditState(); };
        function getDeptColor(dept) {
            const colors = {'CANR': '#15803D', 'CDE': '#1D4ED8', 'CAS': '#EF4444', 'CEM': '#FACC15', 'CEFS': '#FB923C', 'CVM': '#93C5FD', 'GS': '#9CA3AF', 'Non-Teaching Personnel': '#7E22CE'};
            return colors[dept] || '#374151';
        }
        function getPurpColor(purp) {
            const colors = {'IE & VLP Password Reset': '#6D28D9', 'IE Password Reset': '#FACC15', 'VLP Password Reset': '#15803D', 'Update IE Account Details': '#FEF08A', 'Update VLP Account Details': '#86EFAC', 'Update IE & VLP Account Details': '#FCA5A5', 'Hotspot Password Reset': '#1D4ED8', 'IE & Hotspot Password Reset': '#F97316', 'VLP & Hotspot Password Reset': '#FFEDD5', 'IE, VLP, Hotspot Reset': '#B91C1C', 'Zoom Account': '#2563EB'};
            return colors[purp] || '#374151';
        }
    </script>
</body>
</html>
