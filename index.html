<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background-image: url('background.jpg');
            background-size: cover; background-position: center;
            background-attachment: fixed; background-repeat: no-repeat;
            background-color: #333;
        }

        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); z-index: -1;
        }

        /* Form Styling */
        .input-row { display: flex; border-bottom: 1px solid black; align-items: stretch; width: 100%; }
        .input-row:last-child { border-bottom: none; }
        
        /* Labels are regular/normal weight */
        .label-cell { width: 30%; background-color: white; padding: 10px 14px; font-weight: 400; border-right: 2px solid black; display: flex; align-items: center; font-size: 1.1rem; }
        
        .input-cell { width: 70%; padding: 10px; outline: none; background-color: #FFFFFF; text-align: center; font-style: italic; font-size: 1.1rem; color: black; border: none; font-weight: 400; }
        .input-cell:focus { background-color: #eff6ff; }
        
        select option { color: white !important; font-weight: bold !important; }
        option[value=""] { background-color: white !important; color: gray !important; }

        /* Status & Dept Colors */
        .opt-student { background-color: #93C5FD !important; color: black !important; }
        .opt-teaching { background-color: #15803D !important; }
        .opt-non-teaching { background-color: #7E22CE !important; }
        .opt-canr { background-color: #15803D !important; }
        .opt-cde { background-color: #1D4ED8 !important; }
        .opt-cas { background-color: #EF4444 !important; }
        .opt-cem { background-color: #FACC15 !important; color: black !important; }
        .opt-cefs { background-color: #FB923C !important; }
        .opt-cvm { background-color: #93C5FD !important; color: black !important; }
        .opt-gs { background-color: #9CA3AF !important; }
        
        .opt-vlp-ie-reset { background-color: #6D28D9 !important; }
        .opt-ie-reset { background-color: #FACC15 !important; color: black !important; }
        .opt-vlp-reset { background-color: #15803D !important; }
        .opt-upd-ie { background-color: #FEF08A !important; color: black !important; }
        .opt-upd-vlp { background-color: #86EFAC !important; color: black !important; }
        .opt-upd-both { background-color: #FCA5A5 !important; color: black !important; }
        .opt-hotspot { background-color: #1D4ED8 !important; }
        .opt-ie-hot { background-color: #F97316 !important; }
        .opt-vlp-hot { background-color: #FFEDD5 !important; color: black !important; }
        .opt-all-reset { background-color: #B91C1C !important; }
        .opt-zoom { background-color: #2563EB !important; }
        
        /* Table Styling */
        .thin-table { border: 1px solid #000 !important; border-collapse: collapse; table-layout: fixed; }
        .thin-table th { border: 1px solid #000 !important; padding: 8px; @apply bg-gray-100 font-black text-[0.9rem] uppercase; }
        .thin-table td { border: 1px solid #000 !important; padding: 0 8px; font-size: 0.95rem; font-weight: 400; height: 38px; overflow: hidden; }
        .table-container { background: white; border: 1px solid #000; }
        
        .tab-btn { @apply px-4 py-1.5 border-2 border-black font-black mr-2 mb-1 transition-all text-sm shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]; }
        .tab-active { @apply bg-black text-white; }
        .tab-inactive { @apply bg-white text-black hover:bg-gray-100; }

        .page-num { @apply px-3 py-1 border border-black font-bold mx-0.5 transition-all text-sm; }
        .page-num-active { @apply bg-black text-white; }
        .page-num-inactive { @apply bg-white text-black hover:bg-gray-200; }
    </style>
</head>
<body class="p-4 font-sans relative">

    <div class="bg-overlay"></div>

    <div id="customAlert" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white border-4 border-black p-8 max-w-sm w-full shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center">
            <h2 class="text-2xl font-black mb-2 uppercase text-red-600">Missing Info</h2>
            <p class="text-lg font-bold mb-4">Please complete all required fields.</p>
            <button onclick="closeAlert()" class="bg-black text-white font-black py-2 px-8 hover:bg-gray-800 transition-all uppercase">Got it</button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto bg-white/95 shadow-2xl border-2 border-black overflow-hidden mb-4">
        <div class="bg-yellow-400 p-3 text-center border-b-2 border-black">
            <h1 class="text-3xl font-black italic tracking-tight text-black uppercase">Data Entry Portal</h1>
        </div>

        <form id="entryForm" class="p-4" novalidate autocomplete="off">
            <input type="hidden" id="editRowId" value="-1">
            <div class="border-2 border-black mb-1 bg-white">
                <div class="input-row"><div class="label-cell">Full Name:</div><input type="text" id="fullName" class="input-cell" placeholder="Enter name"></div>
                <div class="input-row"><div class="label-cell">Position:</div>
                    <select id="position" class="input-cell">
                        <option value="" class="text-gray-400 bg-white">Select position</option>
                        <option value="Student" class="opt-student">Student</option>
                        <option value="Teaching Personnel" class="opt-teaching">Teaching Personnel</option>
                        <option value="Non-Teaching Personnel" class="opt-non-teaching">Non-Teaching Personnel</option>
                    </select>
                </div>
                <div class="input-row"><div id="idLabel" class="label-cell">Student ID:</div><input type="text" id="idInput" class="input-cell" placeholder="PIL-XX-XXXX"></div>
                <div class="input-row"><div class="label-cell">Department:</div>
                    <select id="dept" class="input-cell">
                        <option value="" class="text-gray-400 bg-white">Select department</option>
                        <option value="CANR" class="opt-canr">CANR</option>
                        <option value="CDE" class="opt-cde">CDE</option>
                        <option value="CAS" class="opt-cas">CAS</option>
                        <option value="CEM" class="opt-cem">CEM</option>
                        <option value="CEFS" class="opt-cefs">CEFS</option>
                        <option value="CVM" class="opt-cvm">CVM</option>
                        <option value="GS" class="opt-gs">GS</option>
                    </select>
                </div>
                <div class="input-row"><div class="label-cell border-b-0">Purpose:</div>
                    <select id="purpose" class="input-cell border-b-0">
                        <option value="" class="text-gray-400 bg-white">Select purpose</option>
                        <option value="IE & VLP Password Reset" class="opt-vlp-ie-reset">IE & VLP Password Reset</option>
                        <option value="IE Password Reset" class="opt-ie-reset">IE Password Reset</option>
                        <option value="VLP Password Reset" class="opt-vlp-reset">VLP Password Reset</option>
                        <option value="Update IE Account Details" class="opt-upd-ie">Update IE Account Details</option>
                        <option value="Update VLP Account Details" class="opt-upd-vlp">Update VLP Account Details</option>
                        <option value="Update IE & VLP Account Details" class="opt-upd-both">Update IE & VLP Account Details</option>
                        <option value="Hotspot Password Reset" class="opt-hotspot">Hotspot Password Reset</option>
                        <option value="IE & Hotspot Password Reset" class="opt-ie-hot">IE & Hotspot Password Reset</option>
                        <option value="VLP & Hotspot Password Reset" class="opt-vlp-hot">VLP & Hotspot Password Reset</option>
                        <option value="IE, VLP, Hotspot Reset" class="opt-all-reset">IE, VLP, Hotspot Reset</option>
                        <option value="Zoom Account" class="opt-zoom">Zoom Account</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-2 pt-1 pb-1">
                <button type="button" id="cancelEdit" class="hidden bg-gray-400 text-white font-black py-2 px-6 rounded-lg border-2 border-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] transition-all uppercase text-sm">Cancel</button>
                <button type="submit" id="submitBtn" class="bg-[#00FF00] hover:bg-green-400 text-black font-black py-2 px-12 rounded-lg border-2 border-black text-2xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-0.5 transition-all">SAVE</button>
            </div>
        </form>

        <hr class="border-t-2 border-black">

        <div class="px-4 pt-3">
            <div id="tabContainer" class="flex flex-wrap"></div>
        </div>

        <div class="p-4 pt-2">
            <div class="table-container">
                <table id="dataTable" class="w-full thin-table text-center">
                    <colgroup>
                        <col style="width: 110px;">
                        <col style="width: 240px;">
                        <col style="width: 150px;">
                        <col style="width: 140px;">
                        <col style="width: 120px;">
                        <col style="width: 250px;">
                        <col style="width: 110px;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th class="text-left">Name</th>
                            <th>Status</th>
                            <th>ID Number</th>
                            <th>Department</th>
                            <th>Purpose</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
            <div id="paginationControls" class="flex justify-center items-center gap-1 mt-4 pb-2"></div>
        </div>
    </div>

    <script>
        const entryForm = document.getElementById('entryForm');
        const submitBtn = document.getElementById('submitBtn');
        const editRowIdInput = document.getElementById('editRowId');
        const cancelEditBtn = document.getElementById('cancelEdit');
        const alertBox = document.getElementById('customAlert');
        const tableBody = document.getElementById('tableBody');
        const tabContainer = document.getElementById('tabContainer');
        const paginationControls = document.getElementById('paginationControls');

        let currentFilter = 'All';
        let allData = [];
        let currentPage = 1;
        const rowsPerPage = 10; 

        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxZfS9AV6BzTscvOrI6UNAHw7V2lxD23vgCI0n7_hDRaXD2Rd73ZA3cPsUQSdoqMTEU/exec';

        window.onload = () => loadCloudData(false);

        function closeAlert() { alertBox.classList.add('hidden'); }

        async function loadCloudData(silent = false) {
            if (!silent) {
                tableBody.innerHTML = '';
                for(let i=0; i<10; i++) {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td colspan="7" class="${i===0 ? 'text-blue-600 animate-pulse font-black text-lg' : ''}">${i===0 ? 'SYNCING...' : ''}</td>`;
                    tableBody.appendChild(tr);
                }
            }
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                allData = await response.json();
                renderPortal();
            } catch (error) { 
                console.error(error); 
                tableBody.innerHTML = '<tr><td colspan="7" class="p-4 text-red-500 font-bold">Failed to load data. Please check connection.</td></tr>';
            }
        }

        // Logic to toggle Student/Employee ID labeling
        document.getElementById('position').addEventListener('change', function() {
            const isEmp = (this.value === "Teaching Personnel" || this.value === "Non-Teaching Personnel");
            document.getElementById('idLabel').textContent = isEmp ? "Employee ID:" : "Student ID:";
            document.getElementById('idInput').placeholder = isEmp ? "E01-XX-XXXX" : "PIL-XX-XXXX";
        });

        entryForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('fullName').value.trim();
            const pos = document.getElementById('position').value;
            const idNum = document.getElementById('idInput').value.trim();
            const dept = document.getElementById('dept').value;
            const purp = document.getElementById('purpose').value;

            if (!name || !pos || !idNum || !dept || !purp) { alertBox.classList.remove('hidden'); return; }

            const rowId = editRowIdInput.value;
            const action = rowId === "-1" ? "addRow" : "edit";
            const now = new Date();
            const monthLabel = "Month of " + now.toLocaleString('default', { month: 'long', year: 'numeric' });
            const formattedDate = `${String(now.getDate()).padStart(2, '0')}/${String(now.getMonth() + 1).padStart(2, '0')}/${now.getFullYear()}`;
            
            const tempRecord = { rowId: action === "edit" ? rowId : "temp-" + Date.now(), date: formattedDate, monthLabel, name, pos, idNum, dept, purp };

            // Optimistic update
            if (action === "addRow") { allData.push(tempRecord); currentPage = 1; } 
            else { const idx = allData.findIndex(d => d.rowId == rowId); if (idx !== -1) allData[idx] = tempRecord; }

            renderPortal();
            submitBtn.disabled = true;
            submitBtn.textContent = "...";
            
            try {
                await fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ action, rowId, date: formattedDate, monthLabel, name, pos, idNum, dept, purp })
                });
                entryForm.reset(); 
                resetEditState();
                setTimeout(() => loadCloudData(true), 2000); 
            } catch (error) { submitBtn.disabled = false; }
        });

        function renderPortal() {
            tabContainer.innerHTML = '';
            const months = [...new Set(allData.map(item => item.monthLabel))].filter(m => m && m.startsWith('Month of'));
            
            // All Button
            const allBtn = document.createElement('button');
            allBtn.textContent = 'ALL';
            allBtn.className = `tab-btn ${currentFilter === 'All' ? 'tab-active' : 'tab-inactive'}`;
            allBtn.onclick = () => { currentFilter = 'All'; currentPage = 1; renderPortal(); };
            tabContainer.appendChild(allBtn);
            
            // Dynamic Month Buttons
            months.forEach(m => {
                const btn = document.createElement('button');
                btn.textContent = m.replace("Month of ", "").toUpperCase();
                btn.className = `tab-btn ${currentFilter === m ? 'tab-active' : 'tab-inactive'}`;
                btn.onclick = () => { currentFilter = m; currentPage = 1; renderPortal(); };
                tabContainer.appendChild(btn);
            });

            const filteredData = [...allData].reverse().filter(d => currentFilter === 'All' || d.monthLabel === currentFilter);
            const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;
            if (currentPage > totalPages) currentPage = totalPages;
            
            const pageData = filteredData.slice((currentPage - 1) * rowsPerPage, currentPage * rowsPerPage);

            tableBody.innerHTML = '';
            pageData.forEach(data => addTableRowUI(data));
            
            // Fill empty rows to maintain table height
            for (let i = 0; i < (rowsPerPage - pageData.length); i++) {
                const tr = document.createElement('tr');
                tr.className = "bg-white border-b border-gray-100";
                tr.innerHTML = `<td>&nbsp;</td><td></td><td></td><td></td><td></td><td></td><td></td>`;
                tableBody.appendChild(tr);
            }
            renderPaginationControls(totalPages);
        }

        function addTableRowUI(data) {
            const row = document.createElement('tr');
            row.className = "bg-white border-b border-black";
            const posColor = data.pos === 'Non-Teaching Personnel' ? '#7E22CE' : (data.pos === 'Teaching Personnel' ? '#15803D' : '#93C5FD');
            const textColor = (data.dept === 'CEM' || data.dept === 'CVM' || data.purp.includes('Update') || data.purp === 'IE Password Reset') ? 'black' : 'white';
            
            row.innerHTML = `
                <td class="truncate">${data.date}</td>
                <td class="text-left truncate font-normal">${data.name}</td>
                <td><span style="background-color: ${posColor}; color: ${data.pos === 'Student' ? 'black' : 'white'}" class="px-2 py-1 rounded-full text-[10px] font-bold inline-block w-full truncate">${data.pos}</span></td>
                <td class="truncate">${data.idNum}</td>
                <td><span style="background-color: ${getDeptColor(data.dept)}; color: ${textColor}" class="px-2 py-1 rounded-full text-[10px] font-bold inline-block w-full truncate">${data.dept}</span></td>
                <td><span style="background-color: ${getPurpColor(data.purp)}; color: ${textColor}" class="px-2 py-1 rounded text-[10px] font-bold inline-block w-full truncate">${data.purp}</span></td>
                <td class="whitespace-nowrap">
                    <button onclick="editRow('${data.rowId}')" class="text-blue-600 hover:underline text-[11px] font-black">EDIT</button>
                    <button onclick="deleteRow('${data.rowId}')" class="text-red-600 hover:underline text-[11px] font-black ml-2">DEL</button>
                </td>
            `;
            tableBody.appendChild(row);
        }

        function renderPaginationControls(totalPages) {
            paginationControls.innerHTML = '';
            const btnClass = 'px-3 py-1 bg-black text-white font-black disabled:opacity-30 uppercase text-[11px]';
            
            const prevBtn = document.createElement('button');
            prevBtn.textContent = 'PREV';
            prevBtn.disabled = currentPage === 1;
            prevBtn.className = btnClass;
            prevBtn.onclick = () => { currentPage--; renderPortal(); };
            paginationControls.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const pBtn = document.createElement('button');
                pBtn.textContent = i;
                pBtn.className = `page-num ${i === currentPage ? 'page-num-active' : 'page-num-inactive'}`;
                pBtn.onclick = () => { currentPage = i; renderPortal(); };
                paginationControls.appendChild(pBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.textContent = 'NEXT';
            nextBtn.disabled = currentPage === totalPages || totalPages === 0;
            nextBtn.className = btnClass;
            nextBtn.onclick = () => { currentPage++; renderPortal(); };
            paginationControls.appendChild(nextBtn);
        }

        function editRow(rowId) {
            const record = allData.find(d => d.rowId == rowId);
            if (!record) return;
            document.getElementById('fullName').value = record.name;
            document.getElementById('position').value = record.pos;
            document.getElementById('idInput').value = record.idNum;
            document.getElementById('dept').value = record.dept;
            document.getElementById('purpose').value = record.purp;
            editRowIdInput.value = rowId;
            submitBtn.textContent = "UPDATE";
            submitBtn.classList.replace('bg-[#00FF00]', 'bg-blue-500');
            submitBtn.classList.add('text-white');
            cancelEditBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRow(rowId) {
            if (!confirm("Delete record?")) return;
            allData = allData.filter(d => d.rowId != rowId);
            renderPortal();
            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'delete', rowId }) });
                setTimeout(() => loadCloudData(true), 1000);
            } catch (e) { console.error(e); }
        }

        function resetEditState() {
            editRowIdInput.value = "-1";
            submitBtn.disabled = false;
            submitBtn.textContent = "SAVE";
            submitBtn.classList.replace('bg-blue-500', 'bg-[#00FF00]');
            submitBtn.classList.remove('text-white');
            cancelEditBtn.classList.add('hidden');
        }

        cancelEditBtn.onclick = () => { entryForm.reset(); resetEditState(); };

        function getDeptColor(dept) {
            const colors = {'CANR': '#15803D', 'CDE': '#1D4ED8', 'CAS': '#EF4444', 'CEM': '#FACC15', 'CEFS': '#FB923C', 'CVM': '#93C5FD', 'GS': '#9CA3AF'};
            return colors[dept] || '#374151';
        }

        function getPurpColor(purp) {
            const colors = {
                'IE & VLP Password Reset': '#6D28D9', 
                'IE Password Reset': '#FACC15', 
                'VLP Password Reset': '#15803D', 
                'Update IE Account Details': '#FEF08A', 
                'Update VLP Account Details': '#86EFAC', 
                'Update IE & VLP Account Details': '#FCA5A5', 
                'Hotspot Password Reset': '#1D4ED8', 
                'IE & Hotspot Password Reset': '#F97316', 
                'VLP & Hotspot Password Reset': '#FFEDD5', 
                'IE, VLP, Hotspot Reset': '#B91C1C', 
                'Zoom Account': '#2563EB'
            };
            return colors[purp] || '#374151';
        }
    </script>
</body>
</html>
