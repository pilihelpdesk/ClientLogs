<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Entry Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        .input-row { display: flex; border-bottom: 2px solid black; align-items: stretch; width: 100%; }
        .input-row:last-child { border-bottom: none; }
        .label-cell { width: 33.33%; background-color: white; padding: 12px; font-weight: bold; border-right: 2px solid black; display: flex; align-items: center; font-size: 1.25rem; }
        .input-cell { width: 66.67%; padding: 12px; outline: none; background-color: #FFFFFF; text-align: center; font-style: italic; font-size: 1.25rem; color: black; border: none; }
        .input-cell:focus { background-color: #eff6ff; }
        
        /* Color Classes for Dropdowns */
        .opt-student { background-color: #93C5FD !important; color: black !important; }
        .opt-teaching { background-color: #15803D !important; }
        .opt-non-teaching { background-color: #7E22CE !important; }
        
        .thin-table { border: 1px solid #000 !important; border-collapse: collapse; }
        .thin-table th { border: 1px solid #000 !important; @apply p-2 bg-gray-100 font-bold; }
        .thin-table td { border: 1px solid #000 !important; @apply p-2; }
        .table-container { max-height: 550px; overflow-y: auto; border: 1px solid #000; }
        thead th { position: sticky; top: -1px; z-index: 10; }
        .tab-btn { @apply px-4 py-2 border-2 border-black font-bold mr-2 mb-2 transition-all text-sm shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]; }
        .tab-active { @apply bg-black text-white; }
        .tab-inactive { @apply bg-white text-black hover:bg-gray-100; }
    </style>
</head>
<body class="bg-gray-100 p-6 font-sans relative min-h-screen">

    <div id="customAlert" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white border-4 border-black p-8 max-w-sm w-full shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center">
            <h2 class="text-2xl font-black mb-4 uppercase text-red-600">Missing Info</h2>
            <p class="text-lg font-bold mb-6">Please complete all required fields.</p>
            <button onclick="closeAlert()" class="bg-black text-white font-bold py-2 px-8 hover:bg-gray-800 transition-all uppercase">Got it</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto bg-white shadow-lg border-2 border-black overflow-hidden mb-12">
        <div class="bg-cyan-400 p-4 text-center border-b-2 border-black">
            <h1 class="text-4xl font-black italic tracking-tight text-black uppercase">Data Entry Portal</h1>
        </div>

        <form id="entryForm" class="p-6" novalidate>
            <input type="hidden" id="editRowId" value="">

            <div class="border-2 border-black mb-4">
                <div class="input-row"><div class="label-cell">Full Name:</div><input type="text" id="fullName" class="input-cell" placeholder="Enter full name"></div>
                <div class="input-row"><div class="label-cell">Position:</div>
                    <select id="position" class="input-cell">
                        <option value="">Click to select</option>
                        <option value="Student" class="opt-student">Student</option>
                        <option value="Teaching Personnel" class="opt-teaching">Teaching Personnel</option>
                        <option value="Non-Teaching Personnel" class="opt-non-teaching">Non-Teaching Personnel</option>
                    </select>
                </div>
                <div class="input-row"><div id="idLabel" class="label-cell">ID Number:</div><input type="text" id="idInput" class="input-cell" placeholder="PIL-XX-XXXX"></div>
                <div class="input-row"><div class="label-cell">Department:</div>
                    <select id="dept" class="input-cell">
                        <option value="">Click to select</option>
                        <option value="CANR">CANR</option><option value="CDE">CDE</option><option value="CAS">CAS</option>
                        <option value="CEM">CEM</option><option value="CEFS">CEFS</option><option value="CVM">CVM</option>
                        <option value="GS">GS</option><option value="Non-Teaching Personnel">Non-Teaching Personnel</option>
                    </select>
                </div>
                <div class="input-row"><div class="label-cell border-b-0">Purpose:</div>
                    <select id="purpose" class="input-cell border-b-0">
                        <option value="">Click to select</option>
                        <option value="IE & VLP Password Reset">IE & VLP Password Reset</option>
                        <option value="IE Password Reset">IE Password Reset</option>
                        <option value="VLP Password Reset">VLP Password Reset</option>
                        <option value="Zoom Account">Zoom Account</option>
                    </select>
                </div>
            </div>

            <div class="flex justify-end gap-4 mb-6">
                <button type="button" id="cancelEdit" class="hidden bg-gray-400 text-white font-bold py-3 px-8 rounded-xl border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] uppercase">Cancel</button>
                <button type="submit" id="submitBtn" class="bg-[#00FF00] hover:bg-green-400 text-black font-bold py-3 px-12 rounded-xl border-2 border-black text-3xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 transition-all">SAVE</button>
            </div>
        </form>

        <div class="p-6">
            <div id="tabContainer" class="flex flex-wrap mb-4"></div>
            <div class="table-container">
                <table id="dataTable" class="w-full thin-table text-sm text-center">
                    <thead>
                        <tr>
                            <th>Date</th><th>Name</th><th>Status</th><th>ID</th><th>Dept</th><th>Purpose</th><th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const entryForm = document.getElementById('entryForm');
        const submitBtn = document.getElementById('submitBtn');
        const editRowId = document.getElementById('editRowId');
        const cancelBtn = document.getElementById('cancelEdit');
        const tableBody = document.getElementById('tableBody');
        const tabContainer = document.getElementById('tabContainer');
        let currentFilter = 'All';
        let allData = [];

        // YOUR URL HERE
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyCZrA73QhGdh4LnAA3qYrdDEGnqMT5bQBUMo3qVGnBQvtu2vrCGYFF2iisL9Sa-MEO/exec';

        window.onload = loadCloudData;

        function closeAlert() { document.getElementById('customAlert').classList.add('hidden'); }

        async function loadCloudData() {
            tableBody.innerHTML = '<tr><td colspan="7" class="p-4 animate-pulse">Loading Cloud Data...</td></tr>';
            try {
                const response = await fetch(GOOGLE_SCRIPT_URL);
                allData = await response.json();
                renderPortal();
            } catch (e) { tableBody.innerHTML = '<tr><td colspan="7" class="text-red-500">Sync Error.</td></tr>'; }
        }

        entryForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const rowId = editRowId.value; // If empty, we are adding new. If has value, we are editing.
            const action = rowId ? 'edit' : 'addRow';

            const entryData = {
                action: action,
                rowId: rowId, // Only used for editing
                date: new Date().toLocaleDateString('en-GB'),
                monthLabel: new Date().toLocaleString('default', { month: 'long', year: 'numeric' }),
                name: document.getElementById('fullName').value,
                pos: document.getElementById('position').value,
                idNum: document.getElementById('idInput').value,
                dept: document.getElementById('dept').value,
                purp: document.getElementById('purpose').value
            };

            if (!entryData.name || !entryData.pos) { document.getElementById('customAlert').classList.remove('hidden'); return; }

            submitBtn.disabled = true;
            submitBtn.textContent = "SYNCING...";

            try {
                await fetch(GOOGLE_SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(entryData) });
                resetForm();
                setTimeout(loadCloudData, 1500);
            } catch (e) { alert("Sync failed."); }
        });

        function renderPortal() {
            // Setup Tabs
            const months = [...new Set(allData.map(item => item.monthLabel))];
            tabContainer.innerHTML = `<button onclick="filterByMonth('All')" class="tab-btn ${currentFilter === 'All' ? 'tab-active' : 'tab-inactive'}">All</button>`;
            months.forEach(m => tabContainer.innerHTML += `<button onclick="filterByMonth('${m}')" class="tab-btn ${currentFilter === m ? 'tab-active' : 'tab-inactive'}">${m}</button>`);

            tableBody.innerHTML = '';
            // Display data
            [...allData].reverse().forEach((data) => {
                if (currentFilter !== 'All' && data.monthLabel !== currentFilter) return;
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${data.date}</td>
                    <td class="text-left font-bold">${data.name}</td>
                    <td>${data.pos}</td>
                    <td>${data.idNum}</td>
                    <td>${data.dept}</td>
                    <td>${data.purp}</td>
                    <td>
                        <button onclick="editRow('${data.rowId}')" class="text-blue-600 font-bold hover:underline px-1">EDIT</button>
                        <button onclick="deleteRow('${data.rowId}')" class="text-red-600 font-bold hover:underline px-1">DEL</button>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function editRow(id) {
            const item = allData.find(d => d.rowId == id);
            if (!item) return;

            document.getElementById('fullName').value = item.name;
            document.getElementById('position').value = item.pos;
            document.getElementById('idInput').value = item.idNum;
            document.getElementById('dept').value = item.dept;
            document.getElementById('purpose').value = item.purp;
            
            editRowId.value = id;
            submitBtn.textContent = "UPDATE RECORD";
            submitBtn.classList.replace('bg-[#00FF00]', 'bg-blue-500');
            cancelBtn.classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function deleteRow(id) {
            if (!confirm("Delete this from the Cloud permanently?")) return;
            try {
                await fetch(GOOGLE_SCRIPT_URL, { 
                    method: 'POST', 
                    mode: 'no-cors', 
                    body: JSON.stringify({ action: 'delete', rowId: id }) 
                });
                setTimeout(loadCloudData, 1000);
            } catch (e) { alert("Delete failed."); }
        }

        function resetForm() {
            entryForm.reset();
            editRowId.value = "";
            submitBtn.textContent = "SAVE";
            submitBtn.disabled = false;
            submitBtn.classList.replace('bg-blue-500', 'bg-[#00FF00]');
            cancelBtn.classList.add('hidden');
        }

        cancelBtn.onclick = resetForm;
        function filterByMonth(m) { currentFilter = m; renderPortal(); }
    </script>
</body>
</html>
